upstream ingestion {
    server ingestion:8080;
}

upstream detection {
    server detection:8001;
}

upstream response {
    server response:8080;
}

upstream grafana {
    server grafana:3000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    # Ingestion API
    location /api/v1/events {
        proxy_pass http://ingestion;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Response API
    location /api/v1/ {
        proxy_pass http://response;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Telegram callback
    location /api/v1/telegram/ {
        proxy_pass http://response;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Detection health
    location /detection/health {
        proxy_pass http://detection/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Ingestion health
    location /healthz {
        proxy_pass http://ingestion/healthz;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Response health
    location /response/healthz {
        proxy_pass http://response/healthz;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Grafana dashboard
    location /grafana/ {
        proxy_pass http://grafana/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Grafana WebSocket (live updates)
    location /grafana/api/live/ {
        proxy_pass http://grafana/api/live/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Prometheus (restrict to internal)
    location /prometheus/ {
        proxy_pass http://prometheus:9090/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Healthcheck for nginx itself
    location /nginx/health {
        return 200 '{"status":"healthy","service":"nginx"}';
        add_header Content-Type application/json;
    }

    # Default
    location / {
        return 404 '{"error":"not found"}';
        add_header Content-Type application/json;
    }
}
