version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  ingestion:
    build: ./ingestion
    ports:
      - "8080:8080"
    environment:
      - REDIS_ADDR=redis:6379
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-}
    depends_on:
      - redis

volumes:
  redis_data:
