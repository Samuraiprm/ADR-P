version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: adr
      POSTGRES_USER: adr
      POSTGRES_PASSWORD: adr
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./detection/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  ingestion:
    build: ./ingestion
    expose:
      - "8080"
    environment:
      - REDIS_ADDR=redis:6379
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-}
    depends_on:
      - redis

  detection:
    build: ./detection
    expose:
      - "8001"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=adr
      - DB_USER=adr
      - DB_PASSWORD=adr
    depends_on:
      - redis
      - postgres

  response:
    build: ./response
    expose:
      - "8080"
    environment:
      - REDIS_ADDR=redis:6379
      - DATABASE_URL=postgres://adr:adr@postgres:5432/adr?sslmode=disable
    depends_on:
      - redis
      - postgres

  nginx:
    build: ./nginx
    ports:
      - "80:80"
    depends_on:
      - ingestion
      - detection
      - response
      - grafana

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml
      - ./grafana/dashboard.json:/var/lib/grafana/dashboards/adr-p.json
    depends_on:
      - prometheus

volumes:
  pg_data:
  redis_data:
  prometheus_data:
  grafana_data:
